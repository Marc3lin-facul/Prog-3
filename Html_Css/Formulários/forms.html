<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="forms.css">
    <title>Formulários</title>
</head>

<body>
    <h1>Criando e Estilizando um Formulário</h1>

    <div class="destaque" id="principal">
        <form method="GET">

            Nome: <input type="text" name="nome" placeholder="Digite seu nome..."><br>
            Email: <input type="email" name="email" placeholder="Digite seu email..."><br>
            Senha: <input type="password" name="senha" placeholder="Digite sua senha..."><br>
            Idade: <input type="number" name="idade" placeholder="Digite sua idade..."><br>
            Telefone: <input type="tel" name="telefone" placeholder="Digite seu telefone..."><br>
            Site: <input type="url" name="site" placeholder="Digite o site..."><br>
            Buscar: <input type="search" name="busca" placeholder="Pesquise algo..."><br>

            <br>

            Sexo:<br>
            <input type="radio" name="sexo" value="M"> Masculino<br>
            <input type="radio" name="sexo" value="F"> Feminino<br>

            <br>

            Data de Nascimento: <input type="date" name="data_nasc"><br>
            Mês: <input type="month" name="mes"><br>
            Semana: <input type="week" name="semana"><br>
            Horário: <input type="time" name="hora"><br>

            <br>

            Estado:
            <select name="estado">
                <option value="RJ">Rio de Janeiro</option>
                <option value="SP">São Paulo</option>
                <option value="MG">Minas Gerais</option>
                <option value="ES">Espírito Santo</option>
                <option value="BA">Bahia</option>
            </select><br>

            <br>

            Cor Preferida: <input type="color" name="cor"><br>
            Satisfação: <input type="range" name="salario" min="0" max="10"><br>
            Arquivo: <input type="file" name="arquivo"><br>

            <br>

            <input type="checkbox" name="aceitar">Aceito os termos<br><br>
            
            <input type="reset" value="Limpar">
            <button type="submit">Enviar</button>

        </form>
    </div>
</body>
</html>
