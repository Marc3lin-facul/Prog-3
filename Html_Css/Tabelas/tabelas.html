<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>Tabelas</title>
    <link rel="stylesheet" href="tabelas.css">
</head>

<body>
    <table border= 1>
        <tr>
            <th colspan="6">Rotina Semanal</th>
        </tr>
        <tr>
            <th rowspan="6">HORARIOS</th>
            <th>Segunda</th>
            <th>Terça</th>
            <th>Quarta</th>
            <th>Quinta</th>
            <th>Sexta</th>
        </tr>
        <tr>
            <td rowspan="2">Programação II</td>
            <td>Economia</td>
            <td>Banco de Dados</td>
            <td>Robótica</td>
            <td>Livre</td>
        </tr>
        <tr>
            <td>Inglês</td>
            <td>Estudo</td>
            <td>Economia</td>
            <td>Monitoria</td>
        </tr>

        <tr>
            <th colspan="6">Almoço</th>
        </tr>
        <tr>
            <td rowspan="2">Monitoria</td>
            <td rowspan="2">Livre</td>
            <td rowspan="2">Curso</td>
            <td rowspan="2">Matemática</td>
            <td>Matemática</td>
        </tr>
        <tr>
            <td>Gramática</td>
        </tr>

    </table>

    <h1>Desafio: Table Truck </h1>
    <table border="1" cellspacing="0" cellpadding="20">
    <!-- Linha 1 -->
    <tr>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>

        <!-- cabine -->
        <td bgcolor="red" colspan="3" rowspan="2"></td>
    </tr>

    <!-- Linha 2 -->
    <tr>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
        <td bgcolor="blue" colspan="2"></td>
    </tr>

    <!-- Linha 3 -->
    <tr>
        <td bgcolor="red" colspan="2"></td>
        <td bgcolor="black" colspan="2"></td>
        <td bgcolor="red" colspan="2"></td>
        <td bgcolor="black" colspan="2"></td>
        <td bgcolor="red" colspan="2"></td>

        <!-- 3 menores da direita -->
        <td bgcolor="red"></td>
        <td bgcolor="black"></td>
        <td bgcolor="red"></td>
    </tr>


</table>
</body>
